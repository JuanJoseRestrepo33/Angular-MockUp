<div class="perfil-page">
  <header class="perfil-header">
    <h1 class="perfil-title">Perfil</h1>
    <div class="status-bar">
      <span class="status-dot status-dot--green"></span>
      <span class="status-text">Sincronizado</span>
      <a routerLink="/app/perfil" class="avatar" aria-label="Ir a perfil">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </a>
    </div>
  </header>
  <div class="perfil-content">
    <div class="perfil-intro">
      <p class="perfil-subtitle">Información personal de tu cuenta TIMA.</p>
      <h2 class="perfil-subtitle-h2">Datos de la cuenta</h2>
    </div>
    <div class="perfil-card-wrapper">
      <div class="perfil-card">
        <div class="perfil-card-header">
          <div class="perfil-user-info">
            <div class="perfil-avatar-wrap">
              <img class="perfil-avatar" src="https://api.dicebear.com/7.x/lorelei/png?seed={{ user.name }}&backgroundColor=F0F1F3&size=80" alt="{{ user.name }}" />
            </div>
            <div class="perfil-user-meta">
              <span class="perfil-user-name">{{ user.name }}</span>
              <span class="perfil-user-email">{{ user.email }}</span>
            </div>
          </div>
          <button type="button" class="btn-logout" (click)="cerrarSesion()">Cerrar sesión</button>
        </div>
        <div class="perfil-fields">
          <div class="perfil-row">
            <div class="perfil-row-left">
              <div class="perfil-icon">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.96 1.08 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
              </div>
              <span class="perfil-label">Nombre</span>
            </div>
            <span class="perfil-value">{{ user.name }}</span>
          </div>
          <div class="perfil-row">
            <div class="perfil-row-left">
              <div class="perfil-icon">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-2 10H6v-2h12v2zm0-4H6V8l6 3.5L18 8v6z"/></svg>
              </div>
              <span class="perfil-label">Correo electrónico</span>
            </div>
            <span class="perfil-value">{{ user.email }}</span>
          </div>
          <div class="perfil-row">
            <div class="perfil-row-left">
              <div class="perfil-icon">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
              </div>
              <span class="perfil-label">Contraseña</span>
            </div>
            <span class="perfil-value">••••••••</span>
          </div>
          <div class="perfil-row">
            <div class="perfil-row-left">
              <div class="perfil-icon">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
              </div>
              <span class="perfil-label">Idioma</span>
            </div>
            <span class="perfil-value">{{ user.language }}</span>
          </div>
          <div class="perfil-row perfil-row--last">
            <div class="perfil-row-left">
              <div class="perfil-icon">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 1H9v2h6V1zm-4 13h2V8h-2v6zm8.03-6.61l1.42-1.42c-.43-.51-.9-.99-1.41-1.41l-1.42 1.42C16.07 4.74 14.12 4 12 4c-4.97 0-9 4.03-9 9s4.02 9 9 9 9-4.03 9-9c0-2.12-.74-4.07-1.97-5.61zM12 20c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
              </div>
              <span class="perfil-label">Zona horaria</span>
            </div>
            <span class="perfil-value">{{ user.timezone }}</span>
          </div>
        </div>
      </div>
      <div class="perfil-actions">
        <button type="button" class="btn-editar" routerLink="/app/perfil/configuracion">Editar</button>
      </div>
    </div>
  </div>
</div>
