<div class="config-page">
  <header class="config-header">
    <div class="header-left">
      <button type="button" class="btn-back" (click)="volver()" aria-label="Volver">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <h1 class="config-title">Configuración de retos</h1>
    </div>
  </header>
  <div class="config-content">
    <div class="form-card">
      <div class="form-section">
        <label class="form-label form-label--primary">
          <span class="form-label-icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H7v2h10v-2h-4v-3.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>
          </span>
          Tipo de reto
        </label>
        <div class="tipo-buttons">
          <button
            type="button"
            class="tipo-btn"
            [class.tipo-btn--active]="tipoReto === 'pasos'"
            (click)="tipoReto = 'pasos'"
          >
            Pasos
          </button>
          <button
            type="button"
            class="tipo-btn"
            [class.tipo-btn--active]="tipoReto === 'ejercicios'"
            (click)="tipoReto = 'ejercicios'"
          >
            Ejercicios
          </button>
        </div>
      </div>

      <div class="form-section">
        <label class="form-label">
          <span class="form-label-icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6h-5.6z"/></svg>
          </span>
          Condición del reto
        </label>
        <input
          type="number"
          class="form-input"
          [(ngModel)]="condicionReto"
          placeholder="Ej: 300"
          min="1"
          step="1"
        />
      </div>

      <div class="form-section">
        <label class="form-label">
          <span class="form-label-icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 1H9v2h6V1zm-4 13h2V8h-2v6zm8.03-6.61l1.42-1.42c-.43-.51-.9-.99-1.41-1.41l-1.42 1.42C16.07 4.74 14.12 4 12 4c-4.97 0-9 4.03-9 9s4.02 9 9 9 9-4.03 9-9c0-2.12-.74-4.07-1.97-5.61zM12 20c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
          </span>
          Ventana de validación
        </label>
        <div class="custom-dropdown">
          <button
            type="button"
            class="custom-dropdown-btn"
            [class.custom-dropdown-btn--open]="ventanaDropdownOpen"
            (click)="ventanaDropdownOpen = !ventanaDropdownOpen"
          >
            {{ ventanaValidacion }}
            <svg class="dropdown-chevron" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
          </button>
          <div class="custom-dropdown-backdrop" *ngIf="ventanaDropdownOpen" (click)="ventanaDropdownOpen = false"></div>
          <div class="custom-dropdown-menu" *ngIf="ventanaDropdownOpen">
            <button
              *ngFor="let opt of ventanasOpciones"
              type="button"
              class="custom-dropdown-option"
              [class.custom-dropdown-option--active]="ventanaValidacion === opt"
              (click)="selectVentana(opt)"
            >
              {{ opt }}
            </button>
          </div>
        </div>
      </div>

      <div class="form-section">
        <label class="form-label">
          <span class="form-label-icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 17v2h6v-2H3zm0-4v2h6v-2H3zm0-6v2h6V5H3zm10 8h8v-2h-8v2zm0-4h8v-2h-8v2zm0-6v2h8V5h-8z"/></svg>
          </span>
          Nivel de exigencia
        </label>
        <div class="tipo-buttons">
          <button
            type="button"
            class="tipo-btn"
            [class.tipo-btn--active]="nivelExigencia === 'estricto'"
            (click)="nivelExigencia = 'estricto'"
          >
            Estricto
          </button>
          <button
            type="button"
            class="tipo-btn"
            [class.tipo-btn--active]="nivelExigencia === 'flexible'"
            (click)="nivelExigencia = 'flexible'"
          >
            Flexible
          </button>
        </div>
      </div>

      <div class="form-section">
        <label class="form-label">
          <span class="form-label-icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          </span>
          Nombre del reto
        </label>
        <input
          type="text"
          class="form-input"
          [(ngModel)]="nombreReto"
          placeholder="Ej: Activación, Caminata diaria..."
        />
      </div>

      <div class="form-section">
        <label class="form-label">
          <span class="form-label-icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 16h8v2H8zm0-4h8v2H8zm0-6h4v2H8zm10 2.18V2H6v2h2v14H6v2h12v-4h2V7.18l-2-2zM14 18H6V4h6v2h2v12z"/></svg>
          </span>
          Descripción (Opcional)
        </label>
        <textarea
          class="form-textarea"
          [(ngModel)]="descripcion"
          placeholder="Escribe una descripción del reto..."
          rows="3"
        ></textarea>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-action btn-action--cancelar" (click)="cancelar()">Cancelar</button>
        <button type="button" class="btn-action btn-action--guardar" (click)="guardar()">Guardar</button>
      </div>
    </div>
  </div>
</div>
