<div class="analisis-page">
  <header class="analisis-header">
    <h1 class="analisis-title">Análisis de constancia</h1>
    <div class="status-bar">
      <span class="status-dot status-dot--green"></span>
      <span class="status-text">Sincronizado</span>
      <a routerLink="/app/perfil" class="avatar" aria-label="Ir a perfil">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </a>
    </div>
  </header>
  <div class="analisis-content">
    <div class="chart-section">
      <div class="chart-header">
        <div class="chart-title-block">
          <h2 class="chart-title">Constancia semanal x días</h2>
          <p class="chart-subtitle">Retos completados</p>
        </div>
        <div class="period-select">
          <select class="period-dropdown" [(ngModel)]="selectedPeriod" (ngModelChange)="onPeriodoChange()">
            <option *ngFor="let p of periodosOpciones" [value]="p.valor">{{ p.etiqueta }}</option>
          </select>
        </div>
      </div>
      <div class="chart-wrapper">
        <canvas #chartCanvas></canvas>
      </div>
    </div>
    <div class="summary-cards">
      <div class="summary-card">
        <div class="summary-card-header">
          <div class="summary-icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
          </div>
          <h3 class="summary-title">Progreso</h3>
        </div>
        <p class="summary-value">4 de 7 días</p>
      </div>
      <div class="summary-card">
        <div class="summary-card-header">
          <div class="summary-icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H7v2h10v-2h-4v-3.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>
          </div>
          <h3 class="summary-title">Retos finalizados</h3>
        </div>
        <p class="summary-value">{{ retosFinalizados }} retos</p>
      </div>
      <div class="summary-card">
        <div class="summary-card-header">
          <div class="summary-icon">
            <svg viewBox="0 0 16 16" fill="currentColor"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71V3.5z"/></svg>
          </div>
          <h3 class="summary-title">Promedio</h3>
        </div>
        <p class="summary-value summary-value--small">{{ promedioPorDia }} retos por dia</p>
      </div>
    </div>
  </div>
</div>
